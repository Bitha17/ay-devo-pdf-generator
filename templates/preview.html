<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PDF Preview</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        h2 {
            margin-bottom: 5px;
        }

        .filename {
            color: #555;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .pdf-viewer {
            width: 90%;
            height: 80vh;
            margin: 0 auto;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .btn {
            margin: 20px;
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }

        .btn:hover {
            background: #5a67d8;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>📄 PDF Preview</h2>
    <div class="filename">{{ filename }}</div>

    <!-- PDF Preview -->
    <div class="pdf-viewer">
        <embed 
            src="data:application/pdf;base64,{{ pdf_data | safe }}" 
            type="application/pdf" 
            width="100%" 
            height="100%">
    </div>

    <!-- Download Button -->
    <br>

    <a id="downloadLink">
        <button class="btn">⬇ Download PDF</button>
    </a>
</div>

<script>
const pdfData = "{{ pdf_data }}";
const filename = "{{ filename | replace(' ', '_') }}";

const link = document.getElementById("downloadLink");

link.href = "data:application/pdf;base64," + pdfData;
link.download = filename;
</script>

</body>
</html>
