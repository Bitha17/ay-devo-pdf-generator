<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PDF Generator</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: #555;
        }

        input[type="file"] {
            width: 100%;
            margin-top: 8px;
            margin-bottom: 10px;
        }

        small {
            display: block;
            margin-bottom: 10px;
            color: red;
            font-size: 12px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #5a67d8;
        }

        button:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        #preview {
            display: none;
            width: auto;
            height: 200px;
            margin: 10px auto;
            border-radius: 8px;
        }

        .footer {
            margin-top: 15px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>📄 Generate PDF</h2>

    <form id="uploadForm" action="/generate" method="post" enctype="multipart/form-data">
        
        <label>Upload TXT File</label>
        <input type="file" id="txtFile" name="txt" accept=".txt" required>
        <small id="txtError"></small>

        <label>Upload Title Image</label>
        <input type="file" id="imgFile" name="title" accept="image/png, image/jpeg" required>
        <small id="imgError"></small>

        <img id="preview">

        <button type="submit" id="submitBtn">Generate PDF</button>
    </form>

    <div class="footer">
        AbbaYouth Devotion PDF Generator | by Tabitha Permalla
    </div>
</div>

<script>
const txtInput = document.getElementById("txtFile");
const imgInput = document.getElementById("imgFile");
const txtError = document.getElementById("txtError");
const imgError = document.getElementById("imgError");
const preview = document.getElementById("preview");
const form = document.getElementById("uploadForm");
const submitBtn = document.getElementById("submitBtn");

// TXT validation
txtInput.addEventListener("change", function () {
    const file = this.files[0];
    txtError.textContent = "";

    if (file && !file.name.toLowerCase().endsWith(".txt")) {
        txtError.textContent = "File must be .txt";
        this.value = "";
    }
});

// IMAGE validation + preview
imgInput.addEventListener("change", function () {
    const file = this.files[0];
    imgError.textContent = "";
    preview.style.display = "none";

    if (file && !file.type.startsWith("image/")) {
        imgError.textContent = "File must be an image (PNG/JPG)";
        this.value = "";
        return;
    }

    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
});

// Prevent invalid submit + loading state
form.addEventListener("submit", function (e) {
    if (!txtInput.files.length || !imgInput.files.length) {
        e.preventDefault();
        alert("Please upload valid files first!");
        return;
    }

    // Loading state
    submitBtn.disabled = true;
    submitBtn.textContent = "Generating PDF...";
});
</script>

</body>
</html>
