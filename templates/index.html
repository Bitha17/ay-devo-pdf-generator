<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PDF Generator</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: #555;
        }

        input[type="file"] {
            width: 100%;
            margin-top: 8px;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #5a67d8;
        }

        .footer {
            margin-top: 15px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>📄 Generate PDF</h2>

    <form action="/generate" method="post" enctype="multipart/form-data">
        
        <label>Upload TXT File</label>
        <input type="file" name="txt" required>

        <label>Upload Title Image</label>
        <input type="file" name="title" required>

        <button type="submit">Generate PDF</button>
    </form>

    <div class="footer">
        AbbaYouth PDF Generator
    </div>
</div>

</body>
</html>
